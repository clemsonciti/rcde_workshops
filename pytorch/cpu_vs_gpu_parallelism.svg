  <text x="240" y="108" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#405261">Fewer, more complex cores</text>
  <text x="720" y="108" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#405261">Many simpler cores working in parallel</text>

  <rect x="70" y="130" width="340" height="230" rx="20" fill="#d9e4dd" stroke="#5b7c6f" stroke-width="3"/>
